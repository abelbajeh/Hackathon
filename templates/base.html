<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-gray-800 border-b border-gray-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="{{ url_for('index') }}" class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-wider">
                        AgentGrid
                    </a>
                </div>
                <div class="flex space-x-4 items-center">
                    <a href="{{ url_for('index') }}" class="text-gray-300 hover:text-white transition">Marketplace</a>
                    
                    {% if session.get('role') == 'employer' %}
                        <a href="{{ url_for('employer_dashboard') }}" class="text-gray-300 hover:text-white transition">My Inventory</a>
                        <a href="{{ url_for('logout') }}" class="px-4 py-2 rounded-md bg-red-600 hover:bg-red-500 text-white transition">Logout</a>
                    {% elif session.get('role') == 'developer' %}
                        <a href="{{ url_for('developer_dashboard') }}" class="text-gray-300 hover:text-white transition">Dev Hub</a>
                        <a href="{{ url_for('logout') }}" class="px-4 py-2 rounded-md bg-red-600 hover:bg-red-500 text-white transition">Logout</a>
                    {% else %}
                        <a href="{{ url_for('login') }}" class="px-4 py-2 rounded-md bg-blue-600 hover:bg-blue-500 text-white font-semibold shadow-[0_0_10px_rgba(37,99,235,0.4)] transition">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-400 text-sm mt-auto">
        &copy; 2026 AgentGrid Marketplace. All rights reserved.
    </footer>

</body>
</html>
