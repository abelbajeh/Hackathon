{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="bg-gray-800 p-10 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-md relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full blur-[80px] opacity-20 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <h2 class="text-3xl font-extrabold text-white mb-2">Welcome to AgentGrid</h2>
            <p class="text-gray-400 text-sm">Select your workspace role to continue.</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="space-y-6 relative z-10">
            
            <button type="submit" name="role" value="employer" class="w-full group text-left bg-gray-900 border border-gray-600 rounded-xl p-5 hover:border-blue-500 hover:shadow-[0_0_15px_rgba(37,99,235,0.3)] transition-all duration-300">
                <div class="flex items-center">
                    <div class="h-10 w-10 bg-blue-900/50 text-blue-400 rounded-lg flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-lg">Acquire Agents</h3>
                        <p class="text-gray-400 text-xs mt-1">I want to browse and hire AI bots.</p>
                    </div>
                </div>
            </button>

            <button type="submit" name="role" value="developer" class="w-full group text-left bg-gray-900 border border-gray-600 rounded-xl p-5 hover:border-green-500 hover:shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all duration-300">
                <div class="flex items-center">
                    <div class="h-10 w-10 bg-green-900/50 text-green-400 rounded-lg flex items-center justify-center mr-4 group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-lg">Developer Hub</h3>
                        <p class="text-gray-400 text-xs mt-1">I want to build and monetize bots.</p>
                    </div>
                </div>
            </button>
            
        </form>

        <div class="mt-8 border-t border-gray-700 pt-6 text-center text-xs text-gray-500">
            <p>Authentication bypassed for Hackathon Demo mode.</p>
        </div>
    </div>
</div>
{% endblock %}
