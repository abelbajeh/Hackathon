{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto flex flex-col h-[75vh] bg-gray-900 border border-gray-700 rounded-2xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)]">
    
    <header class="bg-gray-800 border-b border-gray-700 p-5 flex justify-between items-center z-10 shadow-md">
        <h2 class="text-2xl font-bold text-white flex items-center">
            <div class="h-10 w-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center text-white font-bold mr-4 shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                {{ bot.name[0] }}
            </div>
            {{ bot.name }} Terminal
        </h2>
        <div class="px-4 py-1.5 bg-green-950/50 text-green-400 rounded-full border border-green-600 text-xs font-bold flex items-center shadow-inner">
            <span class="animate-ping absolute inline-flex h-2.5 w-2.5 rounded-full bg-green-400 opacity-75 mr-2"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500 mr-2"></span>
            CONNECTION SECURE
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 flex flex-col space-y-6" id="chat-box">
        <div class="flex justify-start">
            <div class="bg-gray-800 p-5 rounded-xl max-w-[85%] border border-gray-700 shadow-md">
                <p class="text-gray-300">System online. I am <strong>{{ bot.name }}</strong>. Provide your project description below, and I will generate your Markdown architecture instantly.</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 p-5 border-t border-gray-700">
        <div class="flex gap-4 relative">
            <input type="text" id="user-input"
                class="flex-1 bg-gray-950 border border-gray-600 rounded-xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner"
                placeholder="E.g., I built a Python scraper that grabs Amazon prices..."
                onkeypress="if(event.key === 'Enter') sendMessage()">
            
            <button onclick="sendMessage()"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-4 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)] transition-all duration-300 flex items-center">
                Execute
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </button>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const message = inputField.value;

        if (!message) return;

        // 1. Show User's Message
        chatBox.innerHTML += `
            <div class="flex justify-end">
                <div class="bg-blue-600 text-white p-5 rounded-xl max-w-[85%] shadow-lg">
                    <p>${message}</p>
                </div>
            </div>
        `;

        inputField.value = '';
        const loadingId = 'loading-' + Date.now();

        // 2. Show Animated Loading State
        chatBox.innerHTML += `
            <div id="${loadingId}" class="flex justify-start">
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 text-gray-400 italic flex items-center shadow-md">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Agent is processing...
                </div>
            </div>
        `;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. Send to your Windows Flask app (which forwards to WSL)
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, agent_id: '{{ bot.id }}' })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            // 4. Parse the Markdown and display the beautiful result
            const formattedHTML = marked.parse(data.reply);
            chatBox.innerHTML += `
                <div class="flex justify-start w-full">
                    <div class="bg-gray-800 p-8 rounded-xl w-full max-w-[100%] border-l-4 border-blue-500 shadow-2xl prose prose-invert prose-blue overflow-x-auto">
                        ${formattedHTML}
                    </div>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="text-red-500 flex justify-start"><div class="bg-gray-800 p-4 rounded border border-red-500">Terminal connection lost. Ensure WSL bot is running.</div></div>`;
        }
    }
</script>
{% endblock %}
